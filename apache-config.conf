# Apache Configuration for Law Connectors
# Place this in: /etc/apache2/sites-available/law-connectors.conf

<VirtualHost *:80>
    ServerName test.1xclube.org
    ServerAlias www.test.1xclube.org
    
    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName test.1xclube.org
    ServerAlias www.test.1xclube.org
    
    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/your-certificate.crt
    SSLCertificateKeyFile /etc/ssl/private/your-key.key
    
    # SSL Protocol settings
    SSLProtocol TLSv1.2 TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on

    # Document root for PHP files
    DocumentRoot /var/www/law
    
    # Enable mod_rewrite
    <Directory /var/www/law>
        RewriteEngine On
        Options -MultiViews
        
        # Allow .htaccess overrides
        AllowOverride All
        
        # Allow requests
        Require all granted
        
        # Rewrite rules for pretty URLs if needed
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
    </Directory>

    # PHP Handler
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    # Proxy configuration for Flask API
    # Enable required modules: a2enmod proxy, a2enmod proxy_http, a2enmod rewrite
    ProxyPreserveHost On
    
    # Route /api requests to Flask backend on port 5000
    <Location /api>
        ProxyPass http://127.0.0.1:5000/
        ProxyPassReverse http://127.0.0.1:5000/
        
        # Headers for proper proxying
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
    </Location>

    # Deny access to sensitive files
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
    
    <FilesMatch "\.env$">
        Require all denied
    </FilesMatch>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/law-error.log
    CustomLog ${APACHE_LOG_DIR}/law-access.log combined
</VirtualHost>
